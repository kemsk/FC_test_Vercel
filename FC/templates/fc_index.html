{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XU SSIO - Admin Dashboard</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <!-- CSS Links -->
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- JS Links -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <!-- Header Section -->
  <div class="header d-flex justify-content-between align-items-center p-3">
    <div class="header-title">
      <div class="title-small"><strong>XU FC</strong></div>
    </div>
  </div>

  <!-- Admin Navigation Buttons -->
  <div class="nav buttons d-flex flex-wrap align-items-center p-3">
    <a href="{% url 'fc:Dashboard' %}" class="btn manage me-2 mb-2">
      <b> THIS IS THE DASHBOARD</b>
    </a>

    <div class="date-info ms-auto text-end">
      <div id="current-date"></div>
      <div id="current-time"></div>
    </div>
  </div>

  <div class="horizontal-line my-3"></div>


  <!-- Dynamic Content -->
  {% block content %}
  {% endblock content %}

  <!-- Live Clock Script -->
  <script>
    function updateDateTime() {
      const now = new Date();
      const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const timeOptions = { hour: '2-digit', minute: '2-digit' };

      document.getElementById('current-date').textContent = now.toLocaleDateString(undefined, dateOptions);
      document.getElementById('current-time').textContent = now.toLocaleTimeString(undefined, timeOptions);
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    document.addEventListener('DOMContentLoaded', function () {
      const buttons = document.querySelectorAll('.buttons .btn');
      const sections = document.querySelectorAll('.content-section');

      buttons.forEach(button => {
        button.addEventListener('click', function () {
          buttons.forEach(btn => btn.classList.remove('active-btn'));
          sections.forEach(section => section.style.display = 'none');

          this.classList.add('active-btn');

          const targetId = this.id + '-content';
          const targetSection = document.getElementById(targetId);
          if (targetSection) targetSection.style.display = 'block';
        });
      });
    });
  </script>

</body>

</html>
